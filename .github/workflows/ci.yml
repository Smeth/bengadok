name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Évite les courses entre exécutions ; les déploiements prod restent sérialisés via le groupe ci-dessous
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: Lint (PHP + Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, xml, ctype, json, bcmath, gd, zip, fileinfo, dom, iconv
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Installer dépendances PHP
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Installer dépendances Node
        run: npm ci

      - name: Lint PHP (Pint)
        run: ./vendor/bin/pint --test --parallel

      - name: Vérification format frontend
        run: npm run format:check

      - name: Lint frontend (ESLint)
        run: npm run lint

  tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: bengadok_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_mysql, mbstring, xml, ctype, json, bcmath, gd, zip, fileinfo, dom, iconv
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Installer dépendances PHP
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Installer dépendances Node
        run: npm ci

      - name: Copier .env
        run: cp .env.example .env

      - name: Configurer .env pour les tests
        run: |
          sed -i 's/DB_CONNECTION=sqlite/DB_CONNECTION=mysql/' .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=bengadok_test" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=password" >> .env

      - name: Générer clé application
        run: php artisan key:generate

      - name: Build assets
        run: npm run build

      - name: Créer lien storage
        run: php artisan storage:link

      - name: Exécuter migrations
        run: php artisan migrate --force

      - name: Exécuter les tests
        run: php artisan test --parallel

  deploy:
    name: Déploiement VPS
    needs: [lint, tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Déploiement via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "=== [1/9] Activation mode maintenance ==="
            php artisan down --render="errors.503" --retry=60 || true

            echo "=== [2/9] Récupération du code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== [3/9] Installation dépendances PHP ==="
            composer install \
              --no-interaction \
              --prefer-dist \
              --optimize-autoloader \
              --no-dev

            echo "=== [4/9] Build assets frontend ==="
            rm -f public/hot
            npm ci --prefer-offline
            npm run build

            echo "=== [5/9] Migrations base de données ==="
            php artisan migrate --force

            echo "=== [6/9] Lien storage public ==="
            php artisan storage:link --force || true

            echo "=== [7/9] Nettoyage et mise en cache ==="
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            echo "=== [8/9] Redémarrage du worker de queue ==="
            php artisan queue:restart

            echo "=== [9/9] Désactivation mode maintenance ==="
            php artisan up

            echo "✓ Déploiement terminé avec succès"

      - name: Notification de succès
        if: success()
        run: echo "Déploiement réussi sur ${{ secrets.VPS_HOST }}"

      - name: Désactivation maintenance en cas d'échec
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            php artisan up || true
            echo "⚠ Déploiement échoué — maintenance désactivée"
